description: >-
  The Circuit Breaker is a stability pattern for distributed systems and
  API architectures that prevents cascading failure when a downstream
  service degrades. A breaker wraps a remote call and tracks failures
  against a threshold; when the threshold is exceeded the breaker "opens"
  and short-circuits subsequent calls (typically returning an error or
  fallback) without contacting the downstream service. After a cooldown
  the breaker enters a "half-open" probe state and either resets to
  "closed" on success or re-opens on failure. The pattern was popularized
  by Michael Nygard in *Release It!* and is now standard in resilient
  microservice and API gateway design.
